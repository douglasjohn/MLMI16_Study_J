<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI MNK Study — University of Cambridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 52px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #003b5c;
      color: white;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 4px;
      margin-bottom: 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e5e8ec;
      border-top-color: #003b5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 20px;
      color: #003b5c;
      margin-bottom: 10px;
      font-family: Georgia, 'Times New Roman', serif;
    }
    p { color: #6b7280; font-size: 14px; line-height: 1.6; }

    /* Error state */
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-card h1 { color: #9f1239; }
    .error-card p { margin-bottom: 10px; }
    .error-card a {
      color: #003b5c;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Loading state (shown while redirecting) -->
  <div class="card" id="loading-card">
    <div class="badge">UNIVERSITY OF CAMBRIDGE</div>
    <div class="spinner"></div>
    <h1>AI MNK Study</h1>
    <p>Loading your study session…</p>
  </div>

  <!-- Error state (shown if link is malformed) -->
  <div class="card error-card" id="error-card" style="display:none;">
    <div class="badge">UNIVERSITY OF CAMBRIDGE</div>
    <div class="error-icon">⚠️</div>
    <h1>Invalid Study Link</h1>
    <p>This link appears to be incomplete or incorrect.</p>
    <p>Please use the exact link provided in your invitation email. If you think this is a mistake, contact <a href="mailto:Jd2117@cam.ac.uk">Jd2117@cam.ac.uk</a>.</p>
  </div>

  <script>
    (function () {
      const params  = new URLSearchParams(window.location.search);
      const pid     = (params.get('pid')   || '').trim();
      const study   = (params.get('study') || '').trim();

      // Validate both params are present and study is 1 or 2
      if (!pid || !['1', '2'].includes(study)) {
        document.getElementById('loading-card').style.display = 'none';
        document.getElementById('error-card').style.display  = 'block';
        return;
      }

      // Redirect to the correct study file, carrying the pid forward
      const target = `study_${study}.html?pid=${encodeURIComponent(pid)}`;

      // Small delay so the loading screen is visible (also gives page time to paint)
      setTimeout(function () {
        window.location.replace(target);
      }, 600);
    })();
  </script>

</body>
</html>
